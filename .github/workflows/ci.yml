name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 18 = declared minimum (engines >=18), retained for backward-compat testing even
        # though it is past upstream maintenance. 20 and 22 are maintained LTS lines.
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for forbidden fixtures / secrets
        run: npm run check:secrets

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Type-level tests (ambiguous result narrowing)
        run: npm run test:types

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Consumer import smoke test (dist)
        run: npm run smoke:dist

      - name: Validate package tarball
        run: npm pack --dry-run

      # The packed-package install test is expensive; run it once on a maintained LTS (Node 22)
      # rather than on every matrix entry. Standard validation still runs on 18/20/22 above.
      - name: Packed-package consumer smoke test (installs the .tgz)
        if: matrix.node-version == 22
        run: npm run smoke:package
