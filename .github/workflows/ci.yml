name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 18 = declared minimum (engines >=18), retained for backward-compatibility testing even
        # though it is past upstream maintenance. 22 is an active LTS line; 24 is the current LTS
        # target. (Node 20 is omitted — it has entered maintenance and 22/24 cover current LTS.)
        node-version: [18, 22, 24]
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for forbidden fixtures / secrets
        run: npm run check:secrets

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Type-level tests (ambiguous result narrowing)
        run: npm run test:types

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Packaging integrity check (export map, declarations, version)
        run: npm run check:package

      - name: Consumer import smoke test (dist)
        run: npm run smoke:dist

      - name: Validate package tarball
        run: npm pack --dry-run

      # The packed-package install test (ESM/CJS JavaScript + .mts/.cts TypeScript resolution) is
      # expensive; run it once on the current LTS (Node 24) rather than on every matrix entry.
      # Together the steps above plus this one are equivalent to `npm run validate:release`.
      - name: Packed-package consumer smoke test (installs the .tgz)
        if: matrix.node-version == 24
        run: npm run smoke:package
